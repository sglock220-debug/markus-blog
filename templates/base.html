{% load static %}
<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}刚刚，重磅消息{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=20260524-1">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="container navbar-content">
            <div class="nav-left">
                <a href="{% url 'index' %}" class="site-title">刚刚，重磅消息</a>
            </div>
            <div class="nav-right">
                <button id="search-toggle" class="nav-icon-btn" title="搜索"><i data-lucide="search"></i></button>
                <button id="theme-toggle" class="nav-icon-btn" title="切换主题"><i data-lucide="sun" id="theme-icon"></i></button>
                <button id="menuToggle" class="nav-icon-btn menu-toggle" title="菜单"><i data-lucide="menu"></i></button>
            </div>
        </div>
    </header>

    <!-- 搜索遮罩层 -->
    <div id="search-overlay" class="search-overlay hidden">
        <div class="search-container">
            <form action="{% url 'search' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="搜索文章..." class="search-input" autofocus>
                <button type="submit" class="search-btn"><i data-lucide="search"></i></button>
            </form>
            <button id="search-close" class="close-btn"><i data-lucide="x"></i></button>
        </div>
    </div>

    <!-- 侧边栏菜单 -->
    <div id="sideMenu" class="side-menu">
        <div class="sidebar-header">
            <span class="sidebar-title">菜单</span>
            <button id="sidebar-close" class="close-btn-inline"><i data-lucide="x"></i></button>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'index' %}"><i data-lucide="home"></i> 首页</a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' %}"><i data-lucide="user"></i> 个人主页</a>
                <a href="#"><i data-lucide="info"></i> 关于</a>
                <a href="{% url 'logout' %}" class="logout-link"><i data-lucide="log-out"></i> 退出登录</a>
            {% else %}
                <a href="{% url 'login' %}"><i data-lucide="log-in"></i> 登录 / 注册</a>
            {% endif %}
        </nav>
    </div>

    <!-- 侧边栏遮罩层 -->
    <div id="sideOverlay" class="side-overlay"></div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 刚刚，重磅消息. Powered by Django & Halo Style.</p>
        </div>
    </footer>

    <script src="{% static 'js/main.js' %}?v=20260524-1"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
